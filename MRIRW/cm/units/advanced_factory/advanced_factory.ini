
[core]
name: advanced factory
displayDescription: -produces some advanced units from my mod \n -they are expensive but good
class: CustomUnitMetadata
price: 1500
maxHp: 1800
mass: 9000

#footprint used for collisions with units (left, up, right, down)
footprint: -1,-1,1,1

#used for placement, and placement of other buildings
constructionFootprint: -1,-1,1,3


builtFrom_1_name: builder
builtFrom_1_pos:  6

builtFrom_2_name: combat_engineer
builtFrom_2_pos:  6

builtFrom_3_name: mech_engineer
builtFrom_3_pos:  6

builtFrom_4_name: experimental_spider
builtFrom_4_pos:  6

techLevel: 1
buildSpeed: 0.001
#availableInDemo: true

radius: 35
#displayRadius: 25
isBio: false
isBuilding: true

explodeTypeOnDeath: building


exit_x:0
exit_y:-1
exit_moveAwayAmount:120

canBuild_1_name: setRally
canBuild_1_pos:  0.1

canBuild_2_name: phantom
canBuild_2_pos:  1


[action_upgrade]
convertTo: mechFactoryT2
price:  5000
text: i:gui.actions.upgradeT2
description: i:units.mechFactoryT2.description

displayType: upgrade
buildSpeed: 0.0004
pos: 0.2

iconExtraImage: SHARED:icon_upgrade_top.png
iconExtraColor: #AAFFFFFF




[graphics]
total_frames: 1

image:        advanced_factory.png
image_back:   NONE

#scaleImagesTo: 20
#scaleTurretImagesTo: 9

#AUTO
image_shadow: NONE
shadowOffsetX:1
shadowOffsetY:1


[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
maxAttackRange: 0


[movement]
movementType: NONE
moveSpeed: 0
moveAccelerationSpeed: 0.01
moveDecelerationSpeed: 0.01

maxTurnSpeed: 0
turnAcceleration: 0.1

[ai]

buildPriority: 0.03

noneInBaseExtraPriority: 0.04

noneGlobalExtraPriority: 0.1


maxEachBase: 1
maxGlobal: 5





